<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anki Helper</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
        :root {
            --bg: #0b1220;
            --panel: #111827;
            --panel2: #1f2937;
            --line: #334155;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --green: #22c55e;
            --blue: #3b82f6;
            --red: #ef4444;
            --orange: #f97316;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #020617 0%, var(--bg) 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        h1 { margin: 0; font-size: 28px; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            background: var(--panel2);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover { opacity: 0.93; }
        .btn-primary { background: var(--green); color: #052e16; font-weight: 700; }
        .btn-blue { background: var(--blue); font-weight: 700; }
        .btn-red { background: var(--red); font-weight: 700; }
        .btn-orange { background: var(--orange); font-weight: 700; }
        .btn-small { font-size: 12px; padding: 8px 10px; }
        .btn-mini { font-size: 11px; padding: 6px 10px; min-height: 40px; }
        .btn-tall { min-height: 72px; font-size: 24px; }
        .btn-giant { min-height: 84px; font-size: 28px; font-weight: 700; }
        .bg-red { background: #ef4444; }
        .bg-orange { background: #f97316; }
        .bg-blue { background: #3b82f6; }
        .bg-green { background: #22c55e; color: #052e16; }
        .bg-gray { background: #64748b; }
        .panel {
            background: rgba(17, 24, 39, 0.88);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .panel h3 { margin: 0 0 12px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .quick-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .quick-buttons .btn { min-width: 68px; }
        label {
            display: block;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #020617;
            color: var(--text);
            padding: 10px;
        }
        .switch-row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }
        .switch-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #22c55e;
            padding: 0;
            border-radius: 4px;
        }
        .status {
            white-space: pre-wrap;
            background: #020617;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px;
            min-height: 72px;
            font-size: 13px;
        }
        .hidden { display: none; }
        .grid.mode-anki {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .span-2 { grid-column: span 2; }
        .cmd-btn {
            border: none;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            min-height: 60px;
        }
        .tool-separator {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px dashed var(--line);
        }
        .freq-list {
            display: grid;
            gap: 8px;
            max-height: 520px;
            overflow: auto;
        }
        .freq-row {
            display: grid;
            grid-template-columns: 90px 1fr 110px;
            gap: 8px;
            align-items: center;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #0f172a;
        }
        .freq-rank { color: var(--muted); font-size: 12px; }
        .freq-word { font-weight: 600; }
        @media (max-width: 840px) {
            h1 { font-size: 24px; }
            .grid.mode-anki { grid-template-columns: 1fr; }
            .span-2 { grid-column: span 1; }
            .freq-row { grid-template-columns: 80px 1fr; }
            .freq-row .btn { grid-column: span 2; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Anki Helper</h1>
        <div class="tabs">
            <button class="btn btn-blue" onclick="switchView('dashboard')">桌面控制台</button>
            <button class="btn btn-primary" onclick="switchView('remote')">手机遥控器</button>
            <button class="btn btn-orange" onclick="switchView('wordfreq')">词频制卡</button>
            <button class="btn" onclick="switchView('settings')">设置</button>
        </div>
    </div>

    <div id="dashboardView">
        <div class="panel">
            <h3>音频工具（裁剪 + 放大）</h3>
            <div class="row">
                <div style="flex:1;min-width:220px;">
                    <label for="fieldNameInput">音频字段名</label>
                    <input id="fieldNameInput" value="例句发音" />
                </div>
                <div style="flex:1;min-width:220px;">
                    <label for="amplifyFactorInput">放大量级（factor）</label>
                    <input id="amplifyFactorInput" value="4" />
                </div>
            </div>
            <div class="row">
                <button class="btn btn-primary" onclick="amplifyCurrentAudio()">执行音量放大</button>
                <button class="btn btn-red" onclick="restoreCurrentAudio()">恢复原音频</button>
                <button id="silenceToggleBtn" class="btn btn-blue" onclick="toggleSilentAudioLoop()">开启静音音频循环</button>
            </div>
            <label>去掉开头（点击直接裁剪）</label>
            <div class="quick-buttons" style="margin-bottom: 12px;">
                <button class="btn btn-orange" onclick="quickTrimStart(0.1)">0.1s</button>
                <button class="btn btn-orange" onclick="quickTrimStart(0.2)">0.2s</button>
                <button class="btn btn-orange" onclick="quickTrimStart(0.3)">0.3s</button>
                <button class="btn btn-orange" onclick="quickTrimStart(0.4)">0.4s</button>
                <button class="btn btn-orange" onclick="quickTrimStart(0.5)">0.5s</button>
            </div>
            <label>去掉结尾（点击直接裁剪）</label>
            <div class="quick-buttons">
                <button class="btn btn-orange" onclick="quickTrimEnd(0.1)">0.1s</button>
                <button class="btn btn-orange" onclick="quickTrimEnd(0.2)">0.2s</button>
                <button class="btn btn-orange" onclick="quickTrimEnd(0.3)">0.3s</button>
                <button class="btn btn-orange" onclick="quickTrimEnd(0.4)">0.4s</button>
                <button class="btn btn-orange" onclick="quickTrimEnd(0.5)">0.5s</button>
            </div>
        </div>

        <div class="panel">
            <h3>制卡工具区</h3>
            <div class="row">
                <button id="clipboardToggleBtn" class="btn" onclick="toggleClipboardMonitor()">开启剪贴板图片监控</button>
                <button id="captureToggleBtn" class="btn btn-blue" onclick="toggleCaptureHotkey()">开启音频图片录制（F4）</button>
            </div>
            <div class="tool-separator row">
                <div style="flex:1;min-width:200px;">
                    <label for="cleanDeckInput">牌组名</label>
                    <input id="cleanDeckInput" placeholder="例如：#Listening::English::Audio" />
                </div>
                <div style="flex:1;min-width:160px;">
                    <label for="cleanFieldInput">字段名</label>
                    <input id="cleanFieldInput" placeholder="例如：例句文本" />
                </div>
            </div>
            <div class="row">
                <div style="flex:1;min-width:260px;">
                    <label for="cleanSubstringInput">要删除的字符串</label>
                    <input id="cleanSubstringInput" placeholder="输入要移除的文本片段" />
                </div>
                <button class="btn btn-red" onclick="removeSubstringFromDeckField()">执行删除</button>
            </div>
        </div>

        <div class="panel">
            <h3>操作日志</h3>
            <div id="statusLog" class="status">准备就绪。</div>
        </div>
    </div>

    <div id="remoteView" class="hidden">
        <div class="panel">
            <h3>Anki 手机遥控器</h3>
            <div id="anki-panel" class="grid mode-anki">
                <button onclick="cmd('1')" class="cmd-btn bg-red btn-tall span-2">
                    重来
                </button>
                <button onclick="cmd('2')" class="cmd-btn bg-orange btn-tall span-2">
                    困难
                </button>
                <button onclick="cmd('R')" class="cmd-btn bg-blue btn-tall span-2">
                    回放
                </button>
                <button onclick="cmd('space')" class="cmd-btn bg-green span-2 btn-giant">
                    翻面
                </button>
                <button onclick="cmd('anki_undo')" class="cmd-btn bg-gray btn-mini span-2">
                    撤销
                </button>
            </div>
        </div>
    </div>

    <div id="wordFreqView" class="hidden">
        <div class="panel">
            <h3>词频制卡</h3>
            <div class="row">
                <div style="flex:1;min-width:320px;">
                    <label for="subtitleDirInput">字幕目录（递归搜索）</label>
                    <input id="subtitleDirInput" placeholder="/path/to/subtitles" />
                </div>
            </div>
            <div class="row">
                <div style="flex:1;min-width:140px;">
                    <label for="freqStartInput">开始词频（默认 5000）</label>
                    <input id="freqStartInput" value="5000" />
                </div>
                <div style="flex:1;min-width:140px;">
                    <label for="freqEndInput">结束词频</label>
                    <input id="freqEndInput" value="5100" />
                </div>
                <button class="btn btn-blue" onclick="loadWordFreqList()">加载词汇列表</button>
            </div>
            <div id="freqStats" class="status" style="min-height: 48px;">等待加载词汇...</div>
        </div>
        <div class="panel">
            <h3>词频词汇列表</h3>
            <div id="wordFreqList" class="freq-list"></div>
        </div>
    </div>

    <div id="settingsView" class="hidden">
        <div class="panel">
            <h3>个性化配置</h3>
            <div class="row">
                <div style="flex:1;min-width:280px;">
                    <label for="settingAnkiConnectUrl">AnkiConnect 地址</label>
                    <input id="settingAnkiConnectUrl" />
                </div>
                <div style="flex:1;min-width:280px;">
                    <label for="settingMediaDir">Anki 媒体库绝对路径</label>
                    <input id="settingMediaDir" />
                </div>
            </div>
            <div class="row">
                <div style="flex:1;min-width:220px;">
                    <label for="settingTargetField">默认音频字段名</label>
                    <input id="settingTargetField" />
                </div>
            </div>
            <div class="row">
                <div style="flex:1;min-width:160px;">
                    <label for="settingTrimStart">默认去头秒数</label>
                    <input id="settingTrimStart" />
                </div>
                <div style="flex:1;min-width:160px;">
                    <label for="settingTrimEnd">默认去尾秒数</label>
                    <input id="settingTrimEnd" />
                </div>
                <div style="flex:1;min-width:160px;">
                    <label for="settingAmplify">默认放大量级</label>
                    <input id="settingAmplify" />
                </div>
            </div>
            <div class="row">
                <div style="flex:1;min-width:320px;">
                    <label for="settingSyncTime">自动同步时间（默认 19:30）</label>
                    <input id="settingSyncTime" type="time" value="19:30" />
                </div>
                <div style="flex:1;min-width:260px;">
                    <label>自动同步开关</label>
                    <div class="switch-row">
                        <input id="settingSyncEnabled" type="checkbox" />
                        <span id="settingSyncEnabledText">已关闭</span>
                    </div>
                </div>
            </div>
            <div class="row">
                <button class="btn btn-blue" onclick="loadSettings()">重新加载</button>
            </div>
            <div id="settingsInfo" class="status">正在读取配置...</div>
        </div>
    </div>
</div>

<script>
    function log(msg) {
        const now = new Date().toLocaleTimeString();
        const el = document.getElementById('statusLog');
        el.textContent = `[${now}] ${msg}\n${el.textContent}`;
    }

    async function api(path, method = 'GET', body) {
        const response = await fetch(path, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: body ? JSON.stringify(body) : undefined,
        });
        const data = await response.json();
        if (!data.ok) throw new Error(data.error || '请求失败');
        return data;
    }

    let settingsSaveTimer = null;
    let settingsSaving = false;
    let captureHotkeyEnabled = false;

    function switchView(view) {
        const views = {
            dashboard: document.getElementById('dashboardView'),
            remote: document.getElementById('remoteView'),
            wordfreq: document.getElementById('wordFreqView'),
            settings: document.getElementById('settingsView'),
        };
        Object.values(views).forEach(v => v.classList.add('hidden'));
        views[view].classList.remove('hidden');
        if (view === 'remote') {
            history.replaceState(null, '', '/?mode=remote');
        } else if (view === 'wordfreq') {
            history.replaceState(null, '', '/?mode=wordfreq');
        } else if (view === 'settings') {
            history.replaceState(null, '', '/?mode=settings');
        } else {
            history.replaceState(null, '', '/');
        }
    }

    function getFieldName() {
        const v = document.getElementById('fieldNameInput').value.trim();
        return v || '例句发音';
    }

    function cronToTimeText(cronExpr) {
        const raw = String(cronExpr || '').trim();
        const parts = raw.split(/\s+/);
        if (parts.length < 2) return '19:30';
        const minute = Number(parts[0]);
        const hour = Number(parts[1]);
        if (!Number.isInteger(hour) || !Number.isInteger(minute)) return '19:30';
        if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return '19:30';
        return `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
    }

    function timeTextToCron(timeText) {
        const text = String(timeText || '').trim();
        const matched = /^([01]\d|2[0-3]):([0-5]\d)$/.exec(text);
        if (!matched) return '30 19 * * *';
        const hour = Number(matched[1]);
        const minute = Number(matched[2]);
        return `${minute} ${hour} * * *`;
    }

    async function fetchCurrentCard() {
        try {
            const data = await api(`/api/current-card?fieldName=${encodeURIComponent(getFieldName())}`);
            const card = data.card;
            const audioText = data.audio && !data.audio.error
                ? `音频: ${data.audio.filename} (字段: ${data.audio.fieldName})`
                : `音频: ${data.audio?.error || '无'}`;
            const fields = Object.keys(card.fields || {}).slice(0, 8).join(', ');
            const text = `deck: ${card.deckName}
model: ${card.modelName}
cardId: ${card.cardId}
noteId: ${card.noteId}
${audioText}
fields: ${fields}`;
            log('已刷新当前卡片信息。');
        } catch (error) {
            log(`刷新当前卡片失败: ${error.message}`);
        }
    }

    async function refreshSilentAudioLoopStatus() {
        try {
            const data = await api('/api/audio/silence-loop');
            const btn = document.getElementById('silenceToggleBtn');
            if (btn) {
                btn.textContent = data.enabled ? '关闭静音音频循环' : '开启静音音频循环';
                btn.className = data.enabled ? 'btn btn-red' : 'btn btn-blue';
            }
        } catch (error) {
            log(`读取静音循环状态失败: ${error.message}`);
        }
    }

    async function refreshClipboardMonitorStatus() {
        try {
            const data = await api('/api/clipboard-monitor');
            const btn = document.getElementById('clipboardToggleBtn');
            if (btn) {
                btn.textContent = data.enabled ? '关闭剪贴板图片监控' : '开启剪贴板图片监控';
                btn.className = data.enabled ? 'btn btn-red' : 'btn';
            }
        } catch (error) {
            log(`读取剪贴板监控状态失败: ${error.message}`);
        }
    }

    async function toggleSilentAudioLoop() {
        try {
            const current = await api('/api/audio/silence-loop');
            const data = await api('/api/audio/silence-loop', 'POST', {
                enabled: !current.enabled,
                durationSeconds: 1,
                gapMs: 150,
            });
            log(data.message + '（用于激活蓝牙音频节点）');
            await refreshSilentAudioLoopStatus();
        } catch (error) {
            log(`切换静音循环失败: ${error.message}`);
        }
    }

    async function toggleClipboardMonitor() {
        try {
            const current = await api('/api/clipboard-monitor');
            const data = await api('/api/clipboard-monitor', 'POST', { enabled: !current.enabled });
            log(data.message);
            await refreshClipboardMonitorStatus();
        } catch (error) {
            log(`切换剪贴板监控失败: ${error.message}`);
        }
    }

    function refreshCaptureToggleStatus() {
        const btn = document.getElementById('captureToggleBtn');
        if (!btn) return;
        btn.textContent = captureHotkeyEnabled
            ? '关闭音频图片录制（F4）'
            : '开启音频图片录制（F4）';
        btn.className = captureHotkeyEnabled ? 'btn btn-red' : 'btn btn-blue';
    }

    function toggleCaptureHotkey() {
        captureHotkeyEnabled = !captureHotkeyEnabled;
        refreshCaptureToggleStatus();
        log(captureHotkeyEnabled ? 'F4 录制已开启（按 F4 触发截图+录音+更新最新卡片）。' : 'F4 录制已关闭。');
    }

    async function trimCurrentAudio(startSeconds, endSeconds) {
        const payload = {
            fieldName: getFieldName(),
            startSeconds,
            endSeconds,
        };
        const data = await api('/api/audio/trim-current', 'POST', payload);
        return data;
    }

    async function quickTrimStart(seconds) {
        try {
            const data = await trimCurrentAudio(seconds, 0);
            log(`${data.message}（去头 ${seconds}s）`);
        } catch (error) {
            log(`去头裁剪失败: ${error.message}`);
        }
    }

    async function quickTrimEnd(seconds) {
        try {
            const data = await trimCurrentAudio(0, seconds);
            log(`${data.message}（去尾 ${seconds}s）`);
        } catch (error) {
            log(`去尾裁剪失败: ${error.message}`);
        }
    }

    async function amplifyCurrentAudio() {
        try {
            const factor = Number(document.getElementById('amplifyFactorInput').value.trim());
            const data = await api('/api/audio/amplify-current', 'POST', {
                fieldName: getFieldName(),
                factor,
            });
            log(`${data.message}（factor=${factor}）`);
        } catch (error) {
            log(`放大失败: ${error.message}`);
        }
    }

    async function restoreCurrentAudio() {
        try {
            const data = await api('/api/audio/restore-current', 'POST', {
                fieldName: getFieldName(),
            });
            log(data.message);
        } catch (error) {
            log(`恢复失败: ${error.message}`);
        }
    }

    async function cmd(command) {
        try {
            const data = await api('/api/remote/cmd', 'POST', { command });
            log(`遥控: ${data.message}`);
            await fetchCurrentCard();
        } catch (error) {
            log(`遥控失败: ${error.message}`);
        }
    }

    async function captureLatestNow() {
        try {
            const data = await api('/api/anki/capture-latest', 'POST');
            log(`已写入最近卡片媒体：note=${data.noteId}`);
        } catch (error) {
            log(`录制失败: ${error.message}`);
        }
    }

    async function loadWordFreqList() {
        try {
            const start = Number(document.getElementById('freqStartInput').value.trim() || 5000);
            const end = Number(document.getElementById('freqEndInput').value.trim() || (start + 100));
            const data = await api(`/api/word-freq/list?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`);
            const container = document.getElementById('wordFreqList');
            container.innerHTML = '';
            for (const row of data.rows) {
                const item = document.createElement('div');
                item.className = 'freq-row';
                item.innerHTML = `
                    <div class="freq-rank">#${row.rank}</div>
                    <div class="freq-word">${row.word}</div>
                    <button class="btn btn-primary btn-small">更新媒体</button>
                `;
                const btn = item.querySelector('button');
                btn.addEventListener('click', async () => {
                    await updateLatestMediaByWord(row.word, row.rank, btn);
                });
                container.appendChild(item);
            }
            document.getElementById('freqStats').textContent = `当前范围: ${data.start} - ${data.end}\n共 ${data.total} 个词`;
            log(`已加载词频列表：${data.start}-${data.end}（${data.total} 个）`);
        } catch (error) {
            log(`加载词频列表失败: ${error.message}`);
        }
    }

    async function updateLatestMediaByWord(word, rank, btnEl) {
        const subtitleDir = document.getElementById('subtitleDirInput').value.trim();
        if (!subtitleDir) {
            log('请先填写字幕目录。');
            return;
        }
        const originText = btnEl.textContent;
        btnEl.disabled = true;
        btnEl.textContent = '更新中...';
        try {
            const data = await api('/api/anki/update-latest-media-by-word', 'POST', {
                word,
                subtitleDir,
            });
            log(`词频#${rank} ${word} 已更新媒体 -> note=${data.noteId}`);
        } catch (error) {
            log(`词频#${rank} ${word} 更新失败: ${error.message}`);
        } finally {
            btnEl.disabled = false;
            btnEl.textContent = originText;
        }
    }

    async function loadSettings() {
        try {
            const data = await api('/api/settings');
            const s = data.settings;
            document.getElementById('settingAnkiConnectUrl').value = s.ankiConnectUrl || '';
            document.getElementById('settingMediaDir').value = s.mediaDir || '';
            document.getElementById('settingTargetField').value = s.targetField || '';
            document.getElementById('settingTrimStart').value = s.defaultTrimStartSeconds ?? '';
            document.getElementById('settingTrimEnd').value = s.defaultTrimEndSeconds ?? '';
            document.getElementById('settingAmplify').value = s.defaultAmplifyFactor ?? '';
            document.getElementById('settingSyncTime').value = cronToTimeText(s.defaultSyncCron || '30 19 * * *');
            document.getElementById('settingSyncEnabled').checked = Boolean(s.syncEnabled);
            document.getElementById('settingSyncEnabledText').textContent = s.syncEnabled ? '已开启' : '已关闭';
            if (document.getElementById('subtitleDirInput')) {
                document.getElementById('subtitleDirInput').value = s.subtitleSearchDir || '';
            }
            if (document.getElementById('cleanFieldInput') && !document.getElementById('cleanFieldInput').value) {
                document.getElementById('cleanFieldInput').value = s.targetField || '';
            }
            document.getElementById('settingsInfo').textContent = `server: ${data.server.host}:${data.server.port}
backup目录(固定): ${data.backupDir}
配置文件已加载。`;
            document.getElementById('fieldNameInput').value = s.targetField || '例句发音';
            document.getElementById('amplifyFactorInput').value = s.defaultAmplifyFactor ?? 4;
        } catch (error) {
            document.getElementById('settingsInfo').textContent = `读取配置失败: ${error.message}`;
        }
    }

    async function saveSettings() {
        if (settingsSaving) return;
        settingsSaving = true;
        try {
            const syncTimeText = document.getElementById('settingSyncTime').value.trim() || '19:30';
            const payload = {
                ankiConnectUrl: document.getElementById('settingAnkiConnectUrl').value.trim(),
                mediaDir: document.getElementById('settingMediaDir').value.trim(),
                mediaDirMac: document.getElementById('settingMediaDir').value.trim(),
                mediaDirWindows: 'C:\\Users\\user\\AppData\\Roaming\\Anki2\\账户 1\\collection.media',
                targetField: document.getElementById('settingTargetField').value.trim(),
                defaultTrimStartSeconds: Number(document.getElementById('settingTrimStart').value.trim()),
                defaultTrimEndSeconds: Number(document.getElementById('settingTrimEnd').value.trim()),
                defaultAmplifyFactor: Number(document.getElementById('settingAmplify').value.trim()),
                defaultSyncCron: timeTextToCron(syncTimeText),
                syncEnabled: document.getElementById('settingSyncEnabled').checked,
            };
            const data = await api('/api/settings', 'POST', payload);
            document.getElementById('settingSyncEnabledText').textContent = data.syncScheduler.enabled ? '已开启' : '已关闭';
            document.getElementById('settingsInfo').textContent = `自动保存成功。
time: ${syncTimeText}
syncEnabled: ${data.syncScheduler.enabled}
cron: ${data.syncScheduler.cron}
nextRunAt: ${data.syncScheduler.nextRunAt || 'null'}`;
        } catch (error) {
            document.getElementById('settingsInfo').textContent = `自动保存失败: ${error.message}`;
        } finally {
            settingsSaving = false;
        }
    }

    function queueAutoSaveSettings() {
        if (settingsSaveTimer) clearTimeout(settingsSaveTimer);
        settingsSaveTimer = setTimeout(() => {
            saveSettings();
        }, 500);
    }

    function bindAutoSaveSettings() {
        const ids = [
            'settingAnkiConnectUrl',
            'settingMediaDir',
            'settingTargetField',
            'settingTrimStart',
            'settingTrimEnd',
            'settingAmplify',
            'settingSyncTime',
            'settingSyncEnabled',
        ];
        ids.forEach((id) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('input', queueAutoSaveSettings);
            el.addEventListener('change', queueAutoSaveSettings);
        });
        const syncToggle = document.getElementById('settingSyncEnabled');
        if (syncToggle) {
            syncToggle.addEventListener('change', () => {
                document.getElementById('settingSyncEnabledText').textContent = syncToggle.checked ? '已开启' : '已关闭';
            });
        }
    }

    async function removeSubstringFromDeckField() {
        try {
            const deck = document.getElementById('cleanDeckInput').value.trim();
            const fieldName = document.getElementById('cleanFieldInput').value.trim();
            const substring = document.getElementById('cleanSubstringInput').value;
            const data = await api('/api/anki/remove-substring', 'POST', {
                deck,
                fieldName,
                substring,
            });
            log(data.message);
        } catch (error) {
            log(`批量清理失败: ${error.message}`);
        }
    }

    (async function init() {
        const mode = new URLSearchParams(location.search).get('mode');
        if (mode === 'remote') switchView('remote');
        else if (mode === 'wordfreq') switchView('wordfreq');
        else if (mode === 'settings') switchView('settings');
        else switchView('dashboard');
        refreshCaptureToggleStatus();
        window.addEventListener('keydown', (event) => {
            if (!captureHotkeyEnabled) return;
            if (event.key === 'F4') {
                event.preventDefault();
                captureLatestNow();
            }
        });
        bindAutoSaveSettings();
        await loadSettings();
        await refreshSilentAudioLoopStatus();
        await refreshClipboardMonitorStatus();
        await fetchCurrentCard();
        await loadWordFreqList();
    })();
</script>
